name: Docker Build & Push (Private + Docker Hub)

on:
  push:
    branches: ["main"]

env:
  SERVICES: docker-service auth-service api-gateway  # 서비스 추가 시 여기만 수정

jobs:
  docker-ci:
    runs-on: [self-hosted, docker]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Git SHA 태그 생성 (앞 7자리) ──────────────────────────────
      - name: Set image tag
        id: tag
        run: echo "SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      # ── 1️⃣ 로그인 ────────────────────────────────────────────────
      # https:// 없이 REGISTRY_URL만 사용 (도메인:포트 형식 권장)
      - name: Login to Private Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 2️⃣ 빌드 ─────────────────────────────────────────────────
      - name: Build docker-service
        run: |
          docker build \
            -t ${{ secrets.REGISTRY_URL }}/docker-service:latest \
            -t ${{ secrets.REGISTRY_URL }}/docker-service:${{ steps.tag.outputs.SHA }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/docker-service:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/docker-service:${{ steps.tag.outputs.SHA }} \
            ./services/docker_service

      - name: Build auth-service
        run: |
          docker build \
            -t ${{ secrets.REGISTRY_URL }}/auth-service:latest \
            -t ${{ secrets.REGISTRY_URL }}/auth-service:${{ steps.tag.outputs.SHA }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:${{ steps.tag.outputs.SHA }} \
            ./services/auth_service

      - name: Build api-gateway
        run: |
          docker build \
            -t ${{ secrets.REGISTRY_URL }}/api-gateway:latest \
            -t ${{ secrets.REGISTRY_URL }}/api-gateway:${{ steps.tag.outputs.SHA }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:${{ steps.tag.outputs.SHA }} \
            ./services/api-gateway

      # ── 3️⃣ 푸시 ─────────────────────────────────────────────────
      - name: Push to Private Registry
        run: |
          for svc in docker-service auth-service api-gateway; do
            docker push ${{ secrets.REGISTRY_URL }}/${svc}:latest
            docker push ${{ secrets.REGISTRY_URL }}/${svc}:${{ steps.tag.outputs.SHA }}
          done

      - name: Push to Docker Hub
        run: |
          for svc in docker-service auth-service api-gateway; do
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/${svc}:latest
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/${svc}:${{ steps.tag.outputs.SHA }}
          done

      # ── 4️⃣ 푸시 검증 (manifest 확인, pull 없이 빠르게) ───────────
      - name: Verify pushed images (Private)
        run: |
          for svc in docker-service auth-service api-gateway; do
            echo "▶ Checking $svc on private registry..."
            docker manifest inspect ${{ secrets.REGISTRY_URL }}/${svc}:latest > /dev/null \
              && echo "✅ $svc:latest OK" \
              || (echo "❌ $svc:latest FAILED" && exit 1)
            docker manifest inspect ${{ secrets.REGISTRY_URL }}/${svc}:${{ steps.tag.outputs.SHA }} > /dev/null \
              && echo "✅ $svc:${{ steps.tag.outputs.SHA }} OK" \
              || (echo "❌ $svc:${{ steps.tag.outputs.SHA }} FAILED" && exit 1)
          done

      - name: Verify pushed images (Docker Hub)
        run: |
          for svc in docker-service auth-service api-gateway; do
            echo "▶ Checking $svc on Docker Hub..."
            docker manifest inspect ${{ secrets.DOCKERHUB_USERNAME }}/${svc}:latest > /dev/null \
              && echo "✅ $svc:latest OK" \
              || (echo "❌ $svc:latest FAILED" && exit 1)
          done

      # ── 5️⃣ 컨테이너 재시작 ───────────────────────────────────────
      - name: Stop & remove existing containers
        run: |
          for svc in docker-service auth-service api-gateway; do
            docker stop ${svc} 2>/dev/null || true
            docker rm   ${svc} 2>/dev/null || true
          done

      # ── 6️⃣ 새 컨테이너 실행 (필요 시 주석 해제) ──────────────────
